name: Alpha Research CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ── Python 3.13 lint + pytest (39 tests) ──────────────────────────────────
  python-test:
    name: "Python 3.13 — lint & pytest"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/python/ scripts/ tests/python/ --select E,F,I,UP --ignore E501

      - name: Run pytest
        run: |
          pytest tests/python/ -v --tb=short \
                 --cov=src/python/alpha_research \
                 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── C++26 build + Google Test ─────────────────────────────────────────────
  cpp-test:
    name: "C++26 — CMake build & Google Test"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libeigen3-dev git g++-14

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nanobind
        run: pip install nanobind

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt','src/cpp/**') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: CMake configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja \
            -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_C_COMPILER=gcc-14

      - name: CMake build
        run: cmake --build build --parallel

      - name: CTest (Google Test)
        run: ctest --test-dir build --output-on-failure

  # ── Bazel smoke test (validates Bazel 7.4.1 gateway, no Bzlmod breakage) ──
  bazel-smoke:
    name: "Bazel 7.4.1 — smoke test"
    runs-on: ubuntu-24.04
    needs: python-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Bazelisk
        run: |
          curl -fsSL \
            "https://github.com/bazelbuild/bazelisk/releases/download/v1.22.0/bazelisk-linux-amd64" \
            -o ${{ github.workspace }}/bazel
          chmod +x ${{ github.workspace }}/bazel
          echo "${{ github.workspace }}" >> $GITHUB_PATH

      - name: Bazel version (reads .bazelversion → 7.4.1)
        run: bazel version

      - name: Smoke — backtest via runner.py (same code bazel run //:backtest calls)
        env:
          N_DAYS: "300"
          N_CURRENCIES: "5"
        run: python scripts/runner.py backtest

  # ── Daily signal decay monitor ────────────────────────────────────────────
  signal-monitor:
    name: "Signal Decay Monitor (daily)"
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run decay monitor
        id: monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          N_DAYS: "500"
        run: |
          python scripts/runner.py monitor 2>&1 | tee monitor_output.txt
          if grep -q "DECAY ALERT" monitor_output.txt; then
            echo "decay_detected=true"  >> "$GITHUB_OUTPUT"
          else
            echo "decay_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack — decay alert
        if: steps.monitor.outputs.decay_detected == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text":"⚠️ *Alpha Research — Signal Decay Alert*\nRepo: ${{ github.repository }}\nIC half-life < 30d or rolling IC < 2%.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Slack — monitor failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text":"🔴 *Alpha Research — Monitor CI FAILED*\nRepo: ${{ github.repository }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Upload monitor output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output-${{ github.run_id }}
          path: monitor_output.txt

  # ── Full backtest on push to main ─────────────────────────────────────────
  full-backtest:
    name: "Full Backtest (push to main)"
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-test, cpp-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full backtest
        env:
          N_DAYS: "2520"
          N_CURRENCIES: "8"
        run: python scripts/runner.py backtest 2>&1 | tee backtest_output.txt

      - name: Quality gate
        run: |
          python - << 'EOF'
          import re, sys
          txt = open("backtest_output.txt").read()
          sharpes = [float(x) for x in re.findall(r"Sharpe.*?([0-9]+\.[0-9]+)", txt)]
          print("Sharpe values found:", sharpes if sharpes else "none (synthetic mode OK)")
          EOF

      - name: Slack — backtest complete
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text":"✅ *Alpha Research — Full Backtest Complete*\nCommit: ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_id }}
          path: backtest_output.txt
