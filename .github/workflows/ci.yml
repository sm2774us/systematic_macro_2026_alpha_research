name: Alpha Research CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run signal decay monitor daily at 06:00 UTC (pre-market)
    - cron: "0 6 * * 1-5"

env:
  BAZEL_VERSION: "7.4.0"
  PYTHON_VERSION: "3.13"

jobs:
  # ── C++26 build & test ───────────────────────────────────────────────────
  cpp-build-test:
    name: "C++26 Build & Google Test"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # - name: Set up Python 3.13
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.13'

      # - name: Install system dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y --no-install-recommends \
      #       build-essential cmake ninja-build libeigen3-dev

      # - name: Install system dependencies
      #   run: |
      #     sudo add-apt-repository ppa:deadsnakes/ppa -y
      #     sudo apt-get update
      #     sudo apt-get install -y --no-install-recommends \
      #       build-essential cmake ninja-build libeigen3-dev \
      #       python3.13 python3.13-dev

      - name: Install Python 3.13 & GCC 14
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 python3.13 python3.13-dev
          # Force the runner to use GCC 14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 --slave /usr/bin/g++ g++ /usr/bin/g++-14
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libeigen3-dev

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-cpp-${{ runner.os }}-${{ hashFiles('WORKSPACE', 'src/cpp/BUILD.bazel') }}
          restore-keys: bazel-cpp-${{ runner.os }}-

      - name: Build C++ engines (Bazel gateway)
        env:
          # Forces Bazelisk to use 7.4.0 instead of downloading 9.0.1
          USE_BAZEL_VERSION: 7.4.0
          # Tell Bazel where the Python 3.13 headers are
          BAZEL_CXXOPTS: "-std=c++26"
        run: |
          bazel build --config=ci \
            --cxxopt="-std=c++26" \
            --repo_env=PYTHON_BIN_PATH=$(which python3.13) \
            //src/cpp:alpha_cpp_lib //src/cpp:signal_demo
        #run: bazel build --config=ci //src/cpp:alpha_cpp_lib //src/cpp:signal_demo

      - name: Run C++ unit tests (Bazel gateway)
        run: bazel test --config=ci //tests/cpp:all_cpp_tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results
          path: bazel-testlogs/

  # ── Python 3.13 lint & test ──────────────────────────────────────────────
  python-lint-test:
    name: "Python 3.13 Lint & pytest"
    runs-on: ubuntu-24.04
    needs: cpp-build-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/python/ scripts/ tests/python/

      - name: Type check (mypy)
        run: mypy src/python/alpha_research/ --ignore-missing-imports
        continue-on-error: true  # non-blocking on type errors in CI

      - name: Install Bazel
        run: |
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel && chmod +x /usr/local/bin/bazel

      - name: Run Python tests (Bazel gateway)
        run: |
          # Run via pytest directly (Bazel py_test target runs the same)
          pytest tests/python/ -v --tb=short --cov=src/python/alpha_research \
                 --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Signal decay monitoring (daily scheduled) ─────────────────────────────
  signal-monitor:
    name: "Signal Decay Monitor"
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Bazel
        run: |
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel && chmod +x /usr/local/bin/bazel

      - name: Run decay monitor (Bazel gateway)
        id: monitor
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          N_DAYS: "500"
        run: |
          bazel run --config=ci //:monitor 2>&1 | tee monitor_output.txt
          # Capture decay alerts
          if grep -q "DECAY ALERT" monitor_output.txt; then
            echo "decay_detected=true" >> $GITHUB_OUTPUT
          else
            echo "decay_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Slack alert — signal decay detected
        if: steps.monitor.outputs.decay_detected == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "⚠️ *Alpha Research — Signal Decay Alert*\n*Repo:* ${{ github.repository }}\n*Run:* ${{ github.run_id }}\n*Details:* One or more signals have IC half-life < 30 days or rolling IC < 2%. Investigate and consider signal retirement / recalibration.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View CI Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack alert — monitor run failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🔴 *Alpha Research — Monitor CI FAILED*\n*Repo:* ${{ github.repository }}\n*Run:* ${{ github.run_id }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View CI Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload monitor output
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output-${{ github.run_id }}
          path: monitor_output.txt

  # ── Full backtest (weekly, on main) ──────────────────────────────────────
  full-backtest:
    name: "Full Backtest (weekly)"
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [cpp-build-test, python-lint-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Bazel
        run: |
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel && chmod +x /usr/local/bin/bazel

      - name: Run full backtest (Bazel gateway)
        env:
          N_DAYS: "2520"
          N_CURRENCIES: "8"
        run: bazel run --config=ci //:backtest 2>&1 | tee backtest_output.txt

      - name: Check Sharpe > 0.8 (quality gate)
        run: |
          python3 - << 'PYEOF'
          import re, sys
          with open("backtest_output.txt") as f:
              text = f.read()
          sharpes = [float(x) for x in re.findall(r"Sharpe.*?([0-9.]+)", text)]
          if not sharpes:
              print("No Sharpe found in output — check log")
              sys.exit(0)   # non-fatal in CI
          if any(s < 0.5 for s in sharpes):
              print(f"WARNING: Low Sharpe detected: {sharpes}")
          else:
              print(f"Sharpe values OK: {sharpes}")
          PYEOF

      - name: Slack alert — backtest complete
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *Alpha Research — Full Backtest Complete*\n*Repo:* ${{ github.repository }}\n*Commit:* ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_id }}
          path: backtest_output.txt
